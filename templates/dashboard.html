<!DOCTYPE html>
<html>

<head>
    <title>EmotiScan AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: linear-gradient(135deg, #4f46e5, #06b6d4, #9333ea);
            background-size: 400% 400%;
            animation: fondo 12s ease infinite;
            overflow: hidden;
        }

        @keyframes fondo {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Sidebar Glass */

        .sidebar {
            width: 240px;
            height: 100vh;
            padding: 30px 20px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, .12);
            border-right: 1px solid rgba(255, 255, 255, .25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, .2);
        }

        .sidebar h2 {
            color: #fff;
            text-align: center;
            margin-bottom: 40px;
            font-size: 28px;
        }

        .sidebar button {
            width: 100%;
            margin-bottom: 15px;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: rgba(255, 255, 255, .12);
            color: white;
            cursor: pointer;
            text-align: left;
            font-size: 16px;
            transition: .35s;
            backdrop-filter: blur(10px);
        }

        .sidebar button:hover {
            background: rgba(255, 255, 255, .25);
            transform: translateX(8px);
        }

        /* Contenido */

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* Secciones */

        .section {
            display: none;
            width: 100%;
            max-width: 900px;
        }

        .active {
            display: block;
        }

        /* Cards Glass */

        .card {
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, .25);
            border-radius: 25px;
            padding: 40px;
            color: white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .2);
        }

        .card h2 {
            font-size: 30px;
            margin-bottom: 20px;
        }

        .card p {
            font-size: 18px;
            color: #eef2ff;
        }

        /* Canvas */

        canvas {
            margin-top: 20px;
            background: white;
            border-radius: 20px;
            padding: 15px;
        }

        /* Scroll bonito */

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: white;
            border-radius: 20px;
        }

        /* Responsive */

        @media(max-width:768px) {

            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }

            .sidebar h2 {
                width: 100%;
            }

            .sidebar button {
                width: 90%;
            }

            .main {
                padding: 20px;
            }

            .card {
                padding: 25px;
            }

        }
    </style>

</head>

<body>

    <!-- MENU -->

    <div class="sidebar">

        <h2>🤖 EmotiScan</h2>

        <button onclick="mostrar('analizar')">🧠 Analizar emoción</button>

        <button onclick="mostrar('grafica')">📊 Gráficas</button>

        <button onclick="mostrar('semana')">📅 Emoción por semana</button>

    </div>


    <!-- CONTENIDO -->

    <div class="main">


        <!-- ANALIZAR -->

        <div id="analizar" class="section active">

            <div class="card">

                <h2>Analizar emoción</h2>

                <p>Aquí aparecerá el análisis de emociones con la cámara.</p>

                <p>Estado actual: 😊 Feliz</p>

            </div>

        </div>
        <!-- GRAFICAS -->

        <div id="grafica" class="section">

            <div class="card">

                <h2>Gráfica de emociones</h2>

                <canvas id="graficaEmociones"></canvas>

            </div>

        </div>
        <!-- SEMANA -->

        <div id="semana" class="section">

            <div class="card">

                <h2>Emoción por semana</h2>

                <canvas id="graficaSemana"></canvas>

            </div>

        </div>

    </div>


    <script>

        function mostrar(seccion) {

            document.querySelectorAll(".section").forEach(s => {
                s.classList.remove("active")
            })

            document.getElementById(seccion).classList.add("active")

        }



        /* GRAFICA GENERAL */

        const datos = {
            labels: ["Feliz", "Triste", "Enojo", "Neutral"],

            datasets: [{
                label: "Emociones",
                data: [8, 3, 2, 5],

                backgroundColor: ["green", "blue", "red", "gray"]
            }]

        }

        new Chart(document.getElementById("graficaEmociones"), {
            type: "bar",
            data: datos
        })



        /* GRAFICA SEMANAL */

        const semana = {
            labels: ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"],

            datasets: [{
                label: "Nivel de felicidad",
                data: [6, 7, 5, 8, 9, 7, 6],

                borderColor: "green",
                fill: false
            }]

        }

        new Chart(document.getElementById("graficaSemana"), {
            type: "line",
            data: semana
        })

    </script>

</body>

</html>
