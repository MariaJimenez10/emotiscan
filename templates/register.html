<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - EmotiScan AI</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;

            background:linear-gradient(-45deg,
            #4f46e5,
            #7c3aed,
            #06b6d4,
            #3b82f6);

            background-size:400% 400%;
            animation:fondo 12s ease infinite;
        }

        @keyframes fondo{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        body::before,
        body::after{
            content:"";
            position:absolute;
            border-radius:50%;
            filter:blur(20px);
        }

        body::before{
            width:280px;
            height:280px;
            background:rgba(255,255,255,.18);
            top:-70px;
            left:-70px;
        }

        body::after{
            width:220px;
            height:220px;
            background:rgba(255,255,255,.15);
            bottom:-40px;
            right:-40px;
        }

        /* TARJETA */

        .register-box{

            width:390px;

            padding:45px;

            border-radius:25px;

            text-align:center;

            background:rgba(255,255,255,.15);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,.25);

            color:white;

            box-shadow:0 15px 40px rgba(0,0,0,.25);

            position:relative;

            z-index:10;

        }

        .logo{

            font-size:65px;

            margin-bottom:10px;

        }

        h2{

            font-size:30px;

            margin-bottom:5px;

        }

        p{

            opacity:.9;

            margin-bottom:30px;

            font-size:14px;

        }

        .input-box{

            position:relative;

            margin-bottom:20px;

        }

        .input-box i{

            position:absolute;

            top:16px;

            left:15px;

            color:#667eea;

        }

        .input-box input{

            width:100%;

            padding:14px 14px 14px 45px;

            border:none;

            outline:none;

            border-radius:50px;

            background:white;

            font-size:15px;

        }

        .input-box input:focus{

            box-shadow:0 0 12px #4f46e5;

        }

        button{

            width:100%;

            padding:15px;

            border:none;

            border-radius:50px;

            background:linear-gradient(90deg,#4f46e5,#7c3aed);

            color:white;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            transform:translateY(-3px);

            box-shadow:0 10px 20px rgba(0,0,0,.3);

        }

        a{

            display:block;

            margin-top:20px;

            text-decoration:none;

            color:white;

            transition:.3s;

        }

        a:hover{

            color:#FFD700;

        }

        .footer{

            margin-top:20px;

            font-size:12px;

            opacity:.8;

        }

        /* MENSAJE */

        #mensaje{

            position:fixed;

            top:25px;

            left:50%;

            transform:translateX(-50%);

            background:#10b981;

            color:white;

            padding:15px 30px;

            border-radius:30px;

            display:none;

            font-weight:bold;

            box-shadow:0 8px 20px rgba(0,0,0,.2);

            z-index:100;

        }

        /* CONFETTI */

        #confetti{

            position:fixed;

            inset:0;

            pointer-events:none;

            z-index:5;

        }

        @media(max-width:500px){

            .register-box{

                width:90%;

                padding:35px 25px;

            }

        }

    </style>

</head>

<body>

<canvas id="confetti"></canvas>

<div id="mensaje">
<i class="fa-solid fa-circle-check"></i>
Cuenta creada correctamente
</div>

<div class="register-box">

<div class="logo">
<i class="fa-solid fa-user-plus"></i>
</div>

<h2>EmotiScan AI</h2>

<p>Crea una cuenta para comenzar</p>

<form action="/guardar" method="POST" onsubmit="registrar(event)">

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" name="usuario" placeholder="Usuario" required>
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" name="password" placeholder="Contraseña" required>
</div>

<button type="submit">
<i class="fa-solid fa-user-check"></i>
Registrarme
</button>

</form>

<a href="/">
<i class="fa-solid fa-arrow-left"></i>
Ya tengo una cuenta
</a>

<div class="footer">
© 2026 EmotiScan AI
</div>

</div>

<script>

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particulas=[];

function crearParticulas(){

    particulas=[];

    for(let i=0;i<180;i++){

        particulas.push({

            x:Math.random()*canvas.width,

            y:-20,

            r:Math.random()*5+2,

            color:`hsl(${Math.random()*360},100%,60%)`,

            vx:(Math.random()-0.5)*6,

            vy:Math.random()*5+3

        });

    }

}

function animar(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    particulas.forEach(p=>{

        ctx.beginPath();

        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

        ctx.fillStyle=p.color;

        ctx.fill();

        p.x+=p.vx;

        p.y+=p.vy;

    });

    requestAnimationFrame(animar);

}

function registrar(e){

    e.preventDefault();

    document.getElementById("mensaje").style.display="block";

    crearParticulas();

    animar();

    setTimeout(()=>{

        e.target.submit();

    },1800);

}

window.onresize=()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

</script>

</body>

</html>
