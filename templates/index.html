<!DOCTYPE html>
<html>

<head>
    <title>EmotiScan AI</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            background: linear-gradient(135deg, #eef2f7, #dce6f2);
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 230px;
            background: #1f2937;
            color: white;
            height: 100vh;
            padding-top: 30px;
            flex-shrink: 0;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .sidebar button {
            width: 100%;
            padding: 15px;
            border: none;
            background: none;
            color: #e5e7eb;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            padding-left: 30px;
        }

        .sidebar button:hover {
            background: #374151;
        }

        .main {
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .section {
            display: none;
            width: 100%;
            max-width: 700px;
        }

        .active {
            display: block;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #0ea5e9;
        }

        #video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            transform: scaleX(-1);
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 10px;
            min-height: 70px;
        }

        #resultado {
            font-size: 1.8rem;
            margin: 0;
        }

        #consejo {
            font-size: 1rem;
            color: #475569;
            margin: 8px 0 0;
        }

        .btn-cam {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.2s;
        }

        .btn-cam:hover {
            background: #0284c7;
        }

        /* Gráfica */
        #grafica .card {
            max-width: 600px;
            margin: 0 auto;
        }

        #graficaEmociones {
            max-height: 300px;
            width: 100% !important;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>🤖 EmotiScan</h2>
        <button onclick="mostrar('analizar')">🧠 Analizar emoción</button>
        <button onclick="mostrar('grafica')">📊 Gráficas</button>
        <button onclick="window.location='/logout'">🚪 Cerrar sesión</button>
    </div>

    <div class="main">

        <!-- ANALIZAR -->
        <div id="analizar" class="section active">
            <div class="card">
                <h2>Reconocimiento de emociones</h2>
                <button class="btn-cam" onclick="startCamera()">📷 Activar cámara</button>
                <div class="camera-container">
                    <video id="video" autoplay></video>
                    <canvas id="canvas"></canvas>
                </div>
                <div class="result-box">
                    <h2 id="resultado">Presiona "Activar cámara"</h2>
                    <h3 id="consejo"></h3>
                </div>
            </div>
        </div>

        <!-- GRAFICA -->
        <div id="grafica" class="section">
            <div class="card">
                <h2>Gráfica de emociones</h2>
                <canvas id="graficaEmociones"></canvas>
            </div>
        </div>

    </div>

    <script>
        // ============ SECCIONES ============
        function mostrar(seccion) {
            document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
            document.getElementById(seccion).classList.add("active");
        }

        // ============ ELEMENTOS ============
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const resultado = document.getElementById("resultado");
        const consejo = document.getElementById("consejo");
        let analizando = false;
        let cameraStarted = false;

        // ============ CONTADOR ============
        const contador = {
            Felicidad: 0,
            Tristeza: 0,
            Enojo: 0,
            Neutral: 0
        };

        // ============ GRÁFICA ============
        const grafica = new Chart(document.getElementById("graficaEmociones"), {
            type: "bar",
            data: {
                labels: ["Felicidad", "Tristeza", "Enojo", "Neutral"],
                datasets: [{
                    label: "Emociones detectadas",
                    data: [0, 0, 0, 0],
                    backgroundColor: [
                        'rgba(75, 192, 192, 0.6)',
                        'rgba(54, 162, 235, 0.6)',
                        'rgba(255, 99, 132, 0.6)',
                        'rgba(201, 203, 207, 0.6)'
                    ],
                    borderColor: [
                        'rgba(75, 192, 192, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 99, 132, 1)',
                        'rgba(201, 203, 207, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        stepSize: 1
                    }
                }
            }
        });

        // ============ FACE MESH ============
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(results => {
            // Limpiar y dibujar la imagen del video en el canvas (con espejo)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(results.image, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();

            // Cuadro escáner
            ctx.strokeStyle = "#00e5ff";
            ctx.lineWidth = 2;
            ctx.strokeRect(50, 30, canvas.width - 100, canvas.height - 60);

            ctx.font = "16px Arial";
            ctx.fillStyle = "#00e5ff";
            ctx.fillText("SCANNING FACE...", 60, 25);

            // Malla facial (dibujada en el canvas con el espejo)
            if (results.multiFaceLandmarks) {
                for (const landmarks of results.multiFaceLandmarks) {
                    // Aplicar espejo a los landmarks para que coincidan con el video
                    const mirroredLandmarks = landmarks.map(lm => ({
                        x: 1 - lm.x,
                        y: lm.y,
                        z: lm.z
                    }));

                    drawConnectors(ctx, mirroredLandmarks, FACEMESH_TESSELATION, { color: "#00e5ff", lineWidth: 0.5 });
                    drawConnectors(ctx, mirroredLandmarks, FACEMESH_RIGHT_EYE, { color: "#00e5ff" });
                    drawConnectors(ctx, mirroredLandmarks, FACEMESH_LEFT_EYE, { color: "#00e5ff" });
                    drawConnectors(ctx, mirroredLandmarks, FACEMESH_LIPS, { color: "#00e5ff" });
                }
            }
        });

        // ============ CÁMARA ============
        function startCamera() {
            if (cameraStarted) return;

            navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 300 } })
                .then(stream => {
                    video.srcObject = stream;
                    cameraStarted = true;

                    // Ajustar canvas al tamaño del video
                    video.onloadedmetadata = () => {
                        canvas.width = video.videoWidth || 400;
                        canvas.height = video.videoHeight || 300;
                    };

                    const camera = new Camera(video, {
                        onFrame: async () => {
                            await faceMesh.send({ image: video });
                        },
                        width: 400,
                        height: 300
                    });

                    camera.start();
                    resultado.innerHTML = "👀 Cámara activa, detectando...";
                    setTimeout(analizar, 1500);
                })
                .catch(err => {
                    alert("Error activando cámara: " + err.message);
                    console.error(err);
                });
        }

        // ============ ANÁLISIS IA ============
        async function analizar() {
            if (!cameraStarted || analizando) {
                setTimeout(analizar, 1000);
                return;
            }

            analizando = true;

            try {
                // Capturar frame actual del video
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
                const imagen = tempCanvas.toDataURL("image/jpeg");

                resultado.innerHTML = "🧠 Analizando...";

                const response = await fetch("/analizar", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ image: imagen })
                });

                if (!response.ok) {
                    const txt = await response.text();
                    console.error("Error del servidor:", txt);
                    resultado.innerHTML = "⚠️ Error del servidor";
                    return;
                }

                const data = await response.json();

                if (data.error) {
                    resultado.innerHTML = "⚠️ " + data.error;
                    return;
                }

                // Mostrar resultados
                resultado.innerHTML = "😊 " + data.emotion;
                consejo.innerHTML = "💡 " + data.advice;

                // Actualizar contador
                if (contador[data.emotion] !== undefined) {
                    contador[data.emotion]++;
                }

                // Actualizar gráfica
                grafica.data.datasets[0].data = [
                    contador.Felicidad,
                    contador.Tristeza,
                    contador.Enojo,
                    contador.Neutral
                ];
                grafica.update();

            } catch (error) {
                console.error("Error en la petición:", error);
                resultado.innerHTML = "⚠️ No fue posible conectar con el servidor.";
            } finally {
                analizando = false;
                if (cameraStarted) {
                    setTimeout(analizar, 3000);
                }
            }
        }

        // ============ INICIALIZACIÓN ============
        resultado.innerHTML = "📷 Presiona 'Activar cámara' para comenzar";
        console.log("EmotiScan AI cargado correctamente");
    </script>

</body>

</html>
