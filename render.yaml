services:
  - type: web
    name: emotiscan-resnet
    env: python
    plan: free
    buildCommand: |
      pip install --no-cache-dir -r requirements.txt
    startCommand: |
      gunicorn --bind 0.0.0.0:10000 app:app \
        --workers 1 \
        --threads 1 \
        --timeout 300 \
        --max-requests 5 \
        --max-requests-jitter 3
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "3"
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
      - key: OMP_NUM_THREADS
        value: "1"
    healthCheckPath: /health
    autoDeploy: true